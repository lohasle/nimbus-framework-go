<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f4f7fb" />
    <meta name="keywords" content="Nimbus Framework运营后台" />
    <meta name="description" content="Nimbus Framework运营后台" />
    <title>%VITE_APP_TITLE%</title>
  </head>
  <body>
    <div id="app">
      <style>
        .app-loading {
          display: grid;
          width: 100%;
          min-height: 100%;
          place-items: center;
          color: #0f172a;
          background:
            radial-gradient(circle at 16% 12%, rgb(59 130 246 / 12%), transparent 31%),
            radial-gradient(circle at 86% 84%, rgb(79 70 229 / 10%), transparent 34%), #f4f7fb;
          font-family:
            Inter,
            ui-sans-serif,
            system-ui,
            -apple-system,
            BlinkMacSystemFont,
            'Segoe UI',
            sans-serif;
        }

        .app-loading-card {
          width: min(360px, calc(100vw - 40px));
          padding: 34px;
          background: rgb(255 255 255 / 86%);
          border: 1px solid rgb(255 255 255 / 92%);
          border-radius: 14px;
          backdrop-filter: blur(18px);
        }

        .app-loading-brand {
          display: flex;
          gap: 14px;
          align-items: center;
        }

        .app-loading-logo {
          width: 54px;
          height: 54px;
          flex: none;
          filter: drop-shadow(0 8px 16px rgb(37 99 235 / 20%));
        }

        .app-loading-eyebrow {
          display: block;
          margin-bottom: 5px;
          font-size: 10px;
          font-weight: 750;
          letter-spacing: 0.18em;
          color: #2563eb;
        }

        .app-loading-title {
          margin: 0;
          font-size: 18px;
          font-weight: 720;
          letter-spacing: -0.02em;
        }

        .app-loading-status {
          display: flex;
          justify-content: space-between;
          margin: 30px 0 10px;
          font-size: 12px;
          color: #64748b;
        }

        .app-loading-status strong {
          font-weight: 650;
          color: #334155;
        }

        .app-loading-track {
          height: 5px;
          overflow: hidden;
          background: #e8eef8;
          border-radius: 999px;
        }

        .app-loading-progress {
          width: 42%;
          height: 100%;
          background: linear-gradient(90deg, #2563eb, #6366f1, #38bdf8);
          border-radius: inherit;
          animation: loading-progress 1.35s cubic-bezier(0.4, 0, 0.2, 1) infinite;
          transform: translateX(-115%);
        }

        @keyframes loading-progress {
          to {
            transform: translateX(340%);
          }
        }

        @media (prefers-reduced-motion: reduce) {
          .app-loading-progress {
            width: 100%;
            animation: none;
            transform: none;
          }
        }

        @media (prefers-color-scheme: dark) {
          .app-loading {
            color: #f2f4f7;
            background: #0b1220;
          }

          .app-loading-card {
            background: #111a2a;
            border-color: #27364a;
          }

          .app-loading-title,
          .app-loading-status strong {
            color: #f2f4f7;
          }

          .app-loading-status {
            color: #98a2b3;
          }

          .app-loading-track {
            background: #223147;
          }
        }
      </style>
      <div class="app-loading" role="status" aria-live="polite" aria-label="Nimbus Framework加载中">
        <div class="app-loading-card">
          <div class="app-loading-brand">
            <img
              src="/brand-mark.svg"
              class="app-loading-logo"
              alt="Nimbus Framework"
              width="54"
              height="54"
            />
            <div>
              <span class="app-loading-eyebrow">NIMBUS OPERATIONS</span>
              <h1 class="app-loading-title">%VITE_APP_TITLE%</h1>
            </div>
          </div>
          <div class="app-loading-status">
            <strong>正在准备工作台…</strong>
            <span>安全连接</span>
          </div>
          <div class="app-loading-track" aria-hidden="true">
            <div class="app-loading-progress"></div>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
