<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f4f7fb" />
    <meta name="keywords" content="Nimbus Framework运营后台" />
    <meta name="description" content="Nimbus Framework运营后台" />
    <title>%VITE_APP_TITLE%</title>
  </head>
  <body>
    <div id="app">
      <style>
        html,
        body,
        #app {
          width: 100%;
          min-height: 100%;
          margin: 0;
        }

        .app-loading {
          display: grid;
          width: 100%;
          min-height: 100vh;
          padding-bottom: 5vh;
          box-sizing: border-box;
          place-items: center;
          color: #1f2a44;
          background:
            radial-gradient(circle at 3% 50%, rgb(22 93 255 / 5%), transparent 34%),
            radial-gradient(circle at 98% 50%, rgb(109 74 255 / 5%), transparent 34%), #fbfcff;
          font-family:
            Inter,
            'PingFang SC',
            'Microsoft YaHei',
            ui-sans-serif,
            system-ui,
            -apple-system,
            BlinkMacSystemFont,
            'Segoe UI',
            sans-serif;
        }

        .app-loading-content {
          width: min(520px, calc(100vw - 48px));
          text-align: center;
        }

        .app-loading-brand {
          display: flex;
          gap: 24px;
          align-items: center;
          justify-content: center;
        }

        .app-loading-logo {
          width: 80px;
          height: 80px;
          flex: none;
          filter: drop-shadow(0 10px 22px rgb(37 99 235 / 16%));
        }

        .app-loading-title {
          margin: 0;
          font-size: clamp(28px, 2.3vw, 36px);
          font-weight: 700;
          line-height: 1.2;
          letter-spacing: -0.025em;
          color: #0b1739;
        }

        .app-loading-heading {
          margin: 42px 0 0;
          font-size: 22px;
          font-weight: 600;
          line-height: 30px;
          color: #1f2a44;
        }

        .app-loading-description {
          margin: 14px 0 0;
          font-size: 16px;
          line-height: 24px;
          color: #94a3b8;
        }

        .app-loading-track {
          width: min(400px, 100%);
          height: 5px;
          margin: 40px auto 0;
          overflow: hidden;
          background: #e9eef7;
          border-radius: 999px;
        }

        .app-loading-progress {
          width: 56%;
          height: 100%;
          background: linear-gradient(90deg, #4f6df5 0%, #3c8ef6 52%, #43c8ec 100%);
          border-radius: inherit;
          animation: loading-progress 1.6s ease-in-out infinite;
          transform: translateX(-105%);
        }

        @keyframes loading-progress {
          to {
            transform: translateX(185%);
          }
        }

        @media (prefers-reduced-motion: reduce) {
          .app-loading-progress {
            width: 56%;
            animation: none;
            transform: none;
          }
        }

        @media (width <= 560px) {
          .app-loading {
            padding-bottom: 2vh;
          }

          .app-loading-brand {
            gap: 16px;
          }

          .app-loading-logo {
            width: 64px;
            height: 64px;
          }

          .app-loading-heading {
            margin-top: 34px;
            font-size: 19px;
          }

          .app-loading-description {
            font-size: 14px;
          }
        }
      </style>
      <div class="app-loading" role="status" aria-live="polite" aria-label="Nimbus Framework加载中">
        <div class="app-loading-content">
          <div class="app-loading-brand">
            <img
              src="/brand-mark.svg"
              class="app-loading-logo"
              alt="Nimbus Framework"
              width="80"
              height="80"
            />
            <h1 class="app-loading-title">%VITE_APP_TITLE%</h1>
          </div>
          <p class="app-loading-heading">正在进入工作台...</p>
          <p class="app-loading-description">请稍候，系统正在准备您的工作环境</p>
          <div class="app-loading-track" aria-hidden="true">
            <div class="app-loading-progress"></div>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
